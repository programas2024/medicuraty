        /* ===== ESTILOS GENERALES ===== */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            min-height: 60vh;
        }
        .auth-card {
            background: white;
            padding: 40px;

            max-width: 450px;
            text-align: center;
            border: 3px solid #f3e9ff;
            transition: all 0.3s ease;
        }
        .auth-logo {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #f3e9ff;
            box-shadow: 0 8px 25px rgba(155, 89, 182, 0.15);
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }
        .auth-input {
            padding: 15px 25px;
            border-radius: 30px;
            border: 2px solid #e0d0f0;
            outline: none;
            font-size: 16px;
            transition: 0.3s;
            font-family: inherit;
        }
        .auth-input:focus {
            border-color: #9b59b6;
            box-shadow: 0 0 10px rgba(155, 89, 182, 0.1);
        }
        .auth-btn {
            background: #9b59b6;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        .auth-btn:hover {
            background: #2c1b4e;
            transform: translateY(-2px);
        }
        .auth-toggle {
            margin-top: 20px;
            color: #9b59b6;
            cursor: pointer;
            font-weight: 600;
            text-decoration: underline;
            transition: 0.3s;
        }
        .auth-toggle:hover {
            color: #2c1b4e;
        }
        .password-wrapper {
            position: relative;
            width: 100%;
        }

            width: 100%;
            padding-right: 50px;
        }
        .password-wrapper .auth-input#regPass {
            padding-right: 95px;
        }

            right: 20px;
            top: 50%;

            cursor: pointer;
            font-size: 18px;
            z-index: 2;

            color: #2c1b4e;
        }

            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 12px;
            z-index: 2;

            font-size: 18px;
        }

        // ============================================================

        function toggleAuth() {
            const login = document.getElementById('loginCard');
            const register = document.getElementById('registerCard');
            if (login.style.display === 'none') {
                login.style.display = 'block';
                register.style.display = 'none';
            } else {
                login.style.display = 'none';
                register.style.display = 'block';
            }
        }

        function toggleVisibility(id, icon) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function generarPassword() {
            const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
            let retVal = "";
            for (let i = 0; i < 12; ++i) {
                retVal += charset.charAt(Math.floor(Math.random() * charset.length));
            }
            
            const p1 = document.getElementById("regPass");
            const p2 = document.getElementById("confirmPass");
            p1.value = retVal;
            p2.value = retVal;
            
            p1.type = "text";
            p2.type = "text";

            Swal.fire({
                title: '¡Contraseña Generada!',
                text: 'Se ha creado una clave segura para ti. ¡No olvides copiarla!',
                icon: 'info',
                timer: 2000,
                showConfirmButton: false,
                customClass: { popup: 'swal-popup-redondo' }
            });
        }

        function copiarPassword() {
            const pass = document.getElementById("regPass").value;
            if (!pass) return;
            navigator.clipboard.writeText(pass).then(() => {
                Swal.fire({
                    title: '¡Copiado!',
                    text: 'Contraseña lista en el portapapeles',
                    icon: 'success',
                    timer: 1500,
                    showConfirmButton: false,
                    customClass: { popup: 'swal-popup-redondo' }
                });
            });
        }

        // ============================================================
        // 5. REGISTRO DE USUARIO
        // ============================================================
        document.getElementById('formRegister').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPass').value;
            const confirm = document.getElementById('confirmPass').value;
            const nombre = document.getElementById('regNombre').value;
            const genero_id = document.getElementById('regGenero').value;

            if (password !== confirm) {
                return Swal.fire('Error', 'Las contraseñas no coinciden', 'error');
            }

            Swal.showLoading();
            
            const valGenero = genero_id ? parseInt(genero_id) : null;

            const { data: authData, error: authError } = await supabaseClient.auth.signUp({ 
                email, 
                password,
                options: {
                    emailRedirectTo: 'https://programas2024.github.io/medicuraty/',
                    data: {
                        nombre: nombre,
                        genero_id: valGenero
                    }
                }
            });

            if (authError) {
                console.error("Error de registro:", authError);
                return Swal.fire('Error', authError.message || "No pudimos crear tu cuenta", 'error');
            }

            if (authData.user && !authData.session) {
                Swal.fire('¡Casi listo!', 'Cuenta creada. Por favor, revisa tu correo para confirmar tu registro.', 'info')
                    .then(() => window.location.href = 'login.html');
            } else if (authData.user) {
                Swal.fire('¡Éxito!', 'Cuenta creada correctamente.', 'success')
                    .then(() => window.location.href = 'login.html');
            }
        });

        // ============================================================
        // 6. LOGIN DE USUARIO
        // ============================================================
        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPass').value;

            Swal.fire({
                title: 'Iniciando sesión',
                text: '“Tu bienestar es el mejor camino para ser feliz”. Conectando...',
                imageUrl: 'imganes/logosmedi.png',
                imageWidth: 100,
                imageHeight: 100,
                showConfirmButton: false,
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                },
                customClass: { popup: 'swal-popup-redondo' }
            });

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) return Swal.fire('Error', error.message || 'Credenciales incorrectas', 'error');
            
            const usuarioNombre = data.user.user_metadata?.nombre || "Usuario";
            
            Swal.fire({
                title: '¡Bienvenido!',
                text: `Hola ${usuarioNombre} (${data.user.email}), qué alegría tenerte de vuelta.`,
                icon: 'success',
                timer: 2500,
                showConfirmButton: false,
                customClass: { popup: 'swal-popup-redondo' }
            }).then(() => {
                window.location.href = 'principal.html';
            });
        });

        // ============================================================
        // 7. RECUPERAR CONTRASEÑA
        // ============================================================
        async function recuperarPassword() {
            const { value: email } = await Swal.fire({
                title: 'Recuperar Contraseña',
                input: 'email',
                inputLabel: 'Ingresa tu correo electrónico',
                inputPlaceholder: 'tu-correo@ejemplo.com',
                confirmButtonText: 'Enviar enlace',
                confirmButtonColor: '#9b59b6',
                showCancelButton: true,
                customClass: { popup: 'swal-popup-redondo' }
            });

            if (email) {
                Swal.showLoading();
                const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                    redirectTo: 'https://programas2024.github.io/medicuraty/restablecer.html',
                });

                if (error) {
                    Swal.fire('Error', error.message, 'error');
                } else {
                    Swal.fire({
                        title: '¡Correo enviado!',
                        text: 'Revisa tu bandeja de entrada para restablecer tu contraseña.',
                        icon: 'success',
                        customClass: { popup: 'swal-popup-redondo' }
                    });
                }
            }
        }
    </script>
</body>
