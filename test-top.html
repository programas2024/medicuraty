<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Top Rank</title>
    <link rel="stylesheet" href="css/galeria.css">
    <style>
        body { background: #f0e6ff; padding: 40px; font-family: Arial; }
        h2 { text-align: center; color: #2c1b4e; margin-bottom: 30px; }
        .galeria-grid { max-width: 800px; margin: 0 auto; }
        .galeria-item img { background: #ddd; }
    </style>
</head>
<body>

            <img src="imganes/camalio.png" alt="Top 1">
            <div class="galeria-caption"><span>🥇 Top 1 - Oro</span></div>
        </div>
        <div class="galeria-item top-rank-2">
            <img src="imganes/gatoperro.jpeg" alt="Top 2">
            <div class="galeria-caption"><span>🥈 Top 2 - Plata</span></div>
        </div>
        <div class="galeria-item top-rank-3">
            <img src="imganes/koala.jpeg" alt="Top 3">
            <div class="galeria-caption"><span>🥉 Top 3 - Bronce</span></div>
        </div>
    </div>
</body>
</html>
