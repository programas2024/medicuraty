<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com 'unsafe-inline' 'unsafe-eval'; style-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; connect-src 'self' https://*.supabase.co https://*.supabase.com wss://*.supabase.co; object-src 'none'; base-uri 'self'; form-action 'self' https:; frame-ancestors 'none'; upgrade-insecure-requests;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta name="referrer-policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()">
    <title>Test Top Rank</title>
    <link rel="stylesheet" href="css/galeria.css">
    <style>
        body { background: #f0e6ff; padding: 40px; font-family: Arial; }
        h2 { text-align: center; color: #2c1b4e; margin-bottom: 30px; }
        .galeria-grid { max-width: 800px; margin: 0 auto; }
        .galeria-item img { background: #ddd; }
    </style>
</head>
<body>
    <h2>🧪 Test - Más Valorado (Top 3)</h2>
    <div class="galeria-grid" style="grid-template-columns: repeat(3, 1fr);">
        <div class="galeria-item top-rank-1">
            <img src="imganes/camalio.png" alt="Top 1">
            <div class="galeria-caption"><span>🥇 Top 1 - Oro</span></div>
        </div>
        <div class="galeria-item top-rank-2">
            <img src="imganes/gatoperro.jpeg" alt="Top 2">
            <div class="galeria-caption"><span>🥈 Top 2 - Plata</span></div>
        </div>
        <div class="galeria-item top-rank-3">
            <img src="imganes/koala.jpeg" alt="Top 3">
            <div class="galeria-caption"><span>🥉 Top 3 - Bronce</span></div>
        </div>
    </div>
</body>
</html>
