        /* ===== ESTILOS GENERALES ===== */
        .auth-container {

        .auth-logo {
            width: 100px;

        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;

        .auth-input {
            padding: 15px 25px;
            border-radius: 30px;

            font-size: 16px;
            transition: 0.3s;
            font-family: inherit;

        .auth-input:focus {

            box-shadow: 0 0 10px rgba(155, 89, 182, 0.1);

        .auth-btn {

            color: white;
            border: none;

            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        .auth-btn:hover {
            background: #2c1b4e;
            transform: translateY(-2px);
        }
        .auth-toggle {
            margin-top: 20px;
            color: #9b59b6;
            cursor: pointer;
            font-weight: 600;
            text-decoration: underline;
            transition: 0.3s;
        }
        .auth-toggle:hover {
            color: #2c1b4e;
        }
        .password-wrapper {
            position: relative;
            width: 100%;
        }
        .password-wrapper .auth-input {
            width: 100%;
            padding-right: 50px;
        }
        .password-wrapper .auth-input#regPass {
            padding-right: 95px;
        }
        .toggle-pass {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #9b59b6;
            cursor: pointer;
            font-size: 18px;
            z-index: 2;
            transition: 0.2s;
        }
        .toggle-pass:hover {
            color: #2c1b4e;
        }
        .pass-actions {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 12px;
            z-index: 2;
        }
        .pass-actions i {
            color: #9b59b6;

            transition: 0.2s;
            font-size: 18px;

        function toggleAuth() {
            const login = document.getElementById('loginCard');
            const register = document.getElementById('registerCard');
            if (login.style.display === 'none') {
                login.style.display = 'block';
                register.style.display = 'none';
            } else {
                login.style.display = 'none';
                register.style.display = 'block';
            }
        }

        function toggleVisibility(id, icon) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function generarPassword() {
            const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
            let retVal = "";
            for (let i = 0; i < 12; ++i) {
                retVal += charset.charAt(Math.floor(Math.random() * charset.length));
            }
            
            const p1 = document.getElementById("regPass");
            const p2 = document.getElementById("confirmPass");
            p1.value = retVal;
            p2.value = retVal;
            
            p1.type = "text";
            p2.type = "text";

            Swal.fire({
                title: '¡Contraseña Generada!',
                text: 'Se ha creado una clave segura para ti. ¡No olvides copiarla!',
                icon: 'info',
                timer: 2000,
                showConfirmButton: false,
                customClass: { popup: 'swal-popup-redondo' }
            });
        }

        function copiarPassword() {
            const pass = document.getElementById("regPass").value;
            if (!pass) return;
            navigator.clipboard.writeText(pass).then(() => {
                Swal.fire({
                    title: '¡Copiado!',
                    text: 'Contraseña lista en el portapapeles',
                    icon: 'success',
                    timer: 1500,
                    showConfirmButton: false,
                    customClass: { popup: 'swal-popup-redondo' }
                });
            });
        }
